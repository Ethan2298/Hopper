<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hopper</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <header>
    <span id="current-file">No file open</span>
    <div class="header-controls">
      <div class="mode-toggle">
        <button id="mode-book" class="active">Book</button>
        <button id="mode-editor">Editor</button>
        <button id="mode-expand-all" title="Expand all">⤢</button>
        <button id="mode-collapse-all" title="Collapse all">⤡</button>
      </div>
    </div>
  </header>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">
        <span id="folder-name">Explorer</span>
        <button id="open-folder">Open</button>
      </div>
      <div id="file-tree"></div>
    </div>
    <div id="book-view">
      <div class="cp-empty">Open a file from the tree</div>
    </div>
    <div id="editor" class="hidden"></div>
  </div>
  <script src="bundle.js"></script>
</body>
</html>
