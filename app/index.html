<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hopper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&family=Literata:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="dark"] {
      --bg: #111111; --text: #fcfcfc;
      --header-bg: #0d0d0d; --header-border: #1f1f1f; --header-title: #a3a3a3;
      --sidebar-bg: #0d0d0d; --sidebar-border: #1f1f1f; --sidebar-text: #a3a3a3; --sidebar-label: #737373;
      --btn-border: #1f1f1f; --btn-text: #a3a3a3;
      --toggle-bg: #1a1a1a; --toggle-text: #737373; --toggle-active-bg: #262626; --toggle-active-text: #fcfcfc;
      --tree-hover: #1a1a1a; --tree-active-bg: #1f1f1f; --tree-active-text: #fcfcfc;
      --accent: #0169cc; --link: #0169cc;
      --title-text: #fcfcfc; --prose-text: #d4d4d4; --muted: #737373;
      --tooltip-bg: #0d0d0d; --tooltip-border: #1f1f1f;
      --error: #e06c75; --loading-dot: #0169cc;
      --folder-icon: #a3a3a3;
    }
    [data-theme="light"] {
      --bg: #ffffff; --text: #0d0d0d;
      --header-bg: #f7f7f7; --header-border: #e5e5e5; --header-title: #525252;
      --sidebar-bg: #f7f7f7; --sidebar-border: #e5e5e5; --sidebar-text: #525252; --sidebar-label: #737373;
      --btn-border: #e5e5e5; --btn-text: #525252;
      --toggle-bg: #ececec; --toggle-text: #737373; --toggle-active-bg: #ffffff; --toggle-active-text: #0d0d0d;
      --tree-hover: #f0f0f0; --tree-active-bg: #e8e8e8; --tree-active-text: #0d0d0d;
      --accent: #0169cc; --link: #0169cc;
      --title-text: #0d0d0d; --prose-text: #262626; --muted: #737373;
      --tooltip-bg: #f7f7f7; --tooltip-border: #e5e5e5;
      --error: #c44; --loading-dot: #0169cc;
      --folder-icon: #525252;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* VSCode-style scrollbars */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-corner {
      background: transparent;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(121, 121, 121, 0.2);
      border-radius: 0;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(121, 121, 121, 0.4);
    }
    ::-webkit-scrollbar-thumb:active {
      background: rgba(121, 121, 121, 0.5);
    }
    [data-theme="light"] ::-webkit-scrollbar-thumb {
      background: rgba(100, 100, 100, 0.2);
    }
    [data-theme="light"] ::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 100, 100, 0.35);
    }
    [data-theme="light"] ::-webkit-scrollbar-thumb:active {
      background: rgba(100, 100, 100, 0.5);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 8px 20px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      font-size: 12px;
      color: var(--header-title);
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #current-file {
      font-family: "Fira Code", "SF Mono", Menlo, monospace;
      color: var(--sidebar-text);
    }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      min-width: 180px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--sidebar-label);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--sidebar-border);
    }
    #open-folder {
      background: none;
      border: 1px solid var(--btn-border);
      color: var(--btn-text);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    #open-folder:hover { background: var(--tree-hover); }
    #file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
      font-size: 13px;
    }

    /* Tree items */
    .tree-item {
      padding: 3px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      white-space: nowrap;
      user-select: none;
      color: var(--sidebar-text);
    }
    .tree-item:hover { background: var(--tree-hover); }
    .tree-file.active { background: var(--tree-active-bg); color: var(--tree-active-text); }
    .tree-icon {
      width: 16px;
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tree-name { margin-left: 4px; }
    .tree-children { padding-left: 12px; }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      gap: 2px;
      background: var(--toggle-bg);
      border-radius: 4px;
      padding: 2px;
      -webkit-app-region: no-drag;
    }
    .mode-toggle button {
      background: none;
      border: none;
      color: var(--toggle-text);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 3px;
      cursor: pointer;
    }
    .mode-toggle button:hover { color: var(--text); }
    .mode-toggle button.active {
      background: var(--toggle-active-bg);
      color: var(--toggle-active-text);
    }

    /* Editor */
    #editor {
      flex: 1;
      overflow: auto;
    }
    #editor .cm-editor { height: 100%; }
    #editor.hidden { display: none; }

    /* Concept tree — main content */
    #concept-tree {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    #concept-tree.hidden { display: none; }

    /* Empty state */
    .cp-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      font-size: 14px;
    }

    /* --- Book panel styles --- */

    .book-prose {
      padding: 40px 48px 60px;
      max-width: 620px;
      margin: 0 auto;
    }
    .book-title {
      font-family: Literata, Georgia, "Times New Roman", serif;
      font-size: 26px;
      font-weight: normal;
      font-style: italic;
      color: var(--title-text);
      margin-bottom: 28px;
      text-align: center;
    }
    .book-paragraph {
      font-family: Literata, Georgia, "Times New Roman", serif;
      font-size: 15px;
      line-height: 1.85;
      color: var(--prose-text);
      margin-bottom: 0;
      text-indent: 1.5em;
    }
    .book-paragraph:first-of-type {
      text-indent: 0;
    }
    .book-file-link {
      color: var(--link);
      text-decoration: none;
      cursor: pointer;
    }
    .book-file-link:hover {
      text-decoration: underline;
    }
    /* Code-linked highlights */
    .book-code-highlight {
      color: var(--accent);
      cursor: default;
    }
    .book-code-highlight:hover {
      opacity: 0.8;
    }

    /* Code tooltip */
    .book-code-tooltip {
      position: fixed;
      display: none;
      background: var(--tooltip-bg);
      border: 1px solid var(--tooltip-border);
      border-radius: 4px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      padding: 10px 14px;
      max-width: 520px;
      max-height: 240px;
      overflow: auto;
      z-index: 9999;
      pointer-events: none;
    }
    .book-code-tooltip pre {
      font-family: "Fira Code", "SF Mono", Menlo, monospace;
      font-size: 12px;
      color: var(--text);
      white-space: pre-wrap;
      margin: 0;
    }

    .book-truncated-note {
      font-family: Literata, Georgia, "Times New Roman", serif;
      font-size: 13px;
      font-style: italic;
      color: var(--muted);
      text-align: center;
      margin-bottom: 20px;
    }

    /* Loading state */
    .book-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 32px;
      color: var(--muted);
      font-size: 14px;
    }
    .book-loading-dot {
      width: 8px;
      height: 8px;
      background: var(--loading-dot);
      border-radius: 50%;
      animation: book-pulse 1s ease-in-out infinite;
    }
    @keyframes book-pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Error state */
    .book-error {
      padding: 32px;
    }
    .book-error-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--error);
      margin-bottom: 8px;
    }
    .book-error-message {
      font-size: 13px;
      color: var(--error);
      line-height: 1.5;
      background: color-mix(in srgb, var(--error) 6%, transparent);
      padding: 12px;
      border-radius: 4px;
      font-family: "Fira Code", "SF Mono", Menlo, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Symbol references */
    .book-symbol-ref {
      color: var(--accent);
      cursor: default;
    }
    .book-symbol-ref:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <header>
    <span>Hopper</span>
    <span id="current-file">No file open</span>
    <div class="header-controls">
      <div class="mode-toggle">
        <button id="mode-reader" class="active">Reader</button>
        <button id="mode-editor">Editor</button>
      </div>
    </div>
  </header>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">
        <span id="folder-name">Explorer</span>
        <button id="open-folder">Open</button>
      </div>
      <div id="file-tree"></div>
    </div>
    <div id="concept-tree">
      <div class="cp-empty">Open a file from the tree</div>
    </div>
    <div id="editor" class="hidden"></div>
  </div>
  <script src="bundle.js"></script>
</body>
</html>
